<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaWing</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background:
                radial-gradient(ellipse at 20% 10%, #152042 0%, transparent 45%),
                radial-gradient(ellipse at 80% 90%, #2a1030 0%, transparent 40%),
                linear-gradient(160deg, #05060f 0%, #0a1020 50%, #070812 100%);
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            color: #9ab0d8;
        }
        .frame {
            position: relative;
            padding: 14px;
            border-radius: 10px;
            background: linear-gradient(145deg, rgba(90, 120, 180, 0.18), rgba(20, 24, 40, 0.9));
            box-shadow:
                0 0 0 1px rgba(120, 160, 255, 0.22),
                0 18px 50px rgba(0, 0, 0, 0.55),
                0 0 80px rgba(60, 120, 255, 0.12);
        }
        .frame::before {
            content: 'NOVAWING';
            position: absolute;
            top: -22px;
            left: 8px;
            font-size: 11px;
            letter-spacing: 0.35em;
            color: #6a8ec8;
            opacity: 0.85;
        }
        canvas {
            display: block;
            border: 1px solid #2a3558;
            border-radius: 4px;
            image-rendering: pixelated;
            box-shadow: inset 0 0 40px rgba(40, 80, 160, 0.15);
        }
    </style>
</head>
<body>
    <div class="frame">
        <script src="game.js"></script>
    </div>
</body>
</html>
